name: Node JS CI
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v6
          - name: set up Node.js
            uses: actions/setup-node@v6
            with:
              node-version: 22
          - name: Install dependencies
            run: npm ci
          - name: Run Test
            run: npm test
          - name: Package build output as ZIP
            run: |
              mkdir output
              cp -r src output/
              cp package.json output/
              zip -r build.zip output
          - name: Upload Artifact
            uses: actions/upload-artifact@v7
            with: 
              name: build-zip
              path: build.zip
